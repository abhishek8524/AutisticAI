databases:
  - name: autisticai-db
    plan: free
    databaseName: sensorysafe
    user: sensorysafe_user

services:
  - type: web
    name: autisticai-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: autisticai-db
          property: connectionString
